spring:
  application:
    name: multitenant-study-02
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT}/multitenant-study-02
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 30000
      max-lifetime: 1200000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        multi_tenancy: SCHEMA
    show-sql: true
    open-in-view: false

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations:
      - classpath:db/migration/common
    schemas: public
    table: flyway_schema_history
    validate-on-migrate: true

# Sever Configuration
server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:certs/private_key.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:certs/public_key.pem}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:86400000}
  platform-admin:
    username: ${APP_PLATFORM_ADMIN_USERNAME:platform_admin}
    email: ${APP_PLATFORM_ADMIN_EMAIL:platform-admin@system.local}
    password: ${APP_PLATFORM_ADMIN_PASSWORD:ChangeMe@123}
    first-name: ${APP_PLATFORM_ADMIN_FIRST_NAME:Platform}
    last-name: ${APP_PLATFORM_ADMIN_LAST_NAME:Admin}

springdoc:
  default-produces-media-type: application/json
  swagger-ui:
    enabled: true
    operations-sorter: true
    tags-sorter: alpha